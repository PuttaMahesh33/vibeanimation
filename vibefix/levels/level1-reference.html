<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:600px;height:400px;display:flex;align-items:center;justify-content:center;background:#0a0a1a;overflow:hidden;}
.circle{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#00d4ff,#0055aa);box-shadow:0 0 30px rgba(0,212,255,.6),0 0 60px rgba(0,212,255,.3);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;box-shadow:0 0 30px rgba(0,212,255,.6),0 0 60px rgba(0,212,255,.3);}50%{transform:scale(1.45);opacity:.7;box-shadow:0 0 60px rgba(0,212,255,.9),0 0 100px rgba(0,212,255,.5);}}
</style></head>
<body><div class="circle"></div></body></html>
