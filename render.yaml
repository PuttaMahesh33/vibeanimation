# render.yaml — Render deployment configuration
# Place this file at the project ROOT (same level as backend/ and frontend/)

services:
  - type: web
    name: vibe-animation-backend
    env: node
    region: singapore          # change to your nearest region
    rootDir: backend           # Render runs npm install from backend/
    buildCommand: npm install
    startCommand: npm start
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ADMIN_TOKEN
        generateValue: true    # Render auto-generates a secure random token
      - key: FRONTEND_URL
        value: https://YOUR_VERCEL_APP.vercel.app   # ← update after Vercel deploy
      - key: DB_PATH
        value: /data/db.json   # persistent disk path

    disk:
      name: vibe-db
      mountPath: /data
      sizeGB: 1
