<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:600px;height:400px;background:#111827;overflow:hidden;}
.scene{position:relative;width:600px;height:400px;}
.ball{position:absolute;left:50%;width:60px;height:60px;margin-left:-30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ff8c00,#cc2200);box-shadow:0 4px 20px rgba(255,100,0,.5);animation:bounce 1.2s cubic-bezier(.215,.61,.355,1) infinite;}
.shadow{position:absolute;bottom:10px;left:50%;width:60px;height:14px;margin-left:-30px;background:rgba(0,0,0,.4);border-radius:50%;animation:shadowPulse 1.2s cubic-bezier(.215,.61,.355,1) infinite;}
.floor{position:absolute;bottom:0;left:0;width:100%;height:24px;background:linear-gradient(180deg,#334155,#1e293b);}
@keyframes bounce{0%{top:20px;transform:scaleX(1) scaleY(1);}80%{top:312px;transform:scaleX(1) scaleY(1);}90%{top:326px;transform:scaleX(1.3) scaleY(.6);}100%{top:312px;transform:scaleX(1) scaleY(1);}}
@keyframes shadowPulse{0%{transform:scaleX(.3);opacity:.15;}80%{transform:scaleX(1);opacity:.5;}90%{transform:scaleX(1.3);opacity:.6;}100%{transform:scaleX(1);opacity:.5;}}
</style></head>
<body><div class="scene"><div class="ball"></div><div class="shadow"></div><div class="floor"></div></div></body></html>
