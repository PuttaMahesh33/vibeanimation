<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:600px;height:400px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
body{animation:wave 6s linear infinite;}
.label{font-family:sans-serif;font-size:2.2rem;font-weight:bold;color:rgba(255,255,255,.85);text-shadow:0 2px 20px rgba(0,0,0,.3);letter-spacing:.1em;text-transform:uppercase;}
@keyframes wave{0%{background:hsl(0,90%,55%);}16%{background:hsl(60,90%,50%);}33%{background:hsl(120,80%,42%);}50%{background:hsl(180,90%,42%);}66%{background:hsl(240,80%,55%);}83%{background:hsl(300,85%,52%);}100%{background:hsl(360,90%,55%);}}
</style></head>
<body><div class="label">Color Wave</div></body></html>
