<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:600px;height:400px;display:flex;align-items:center;justify-content:center;background:#030712;overflow:hidden;}
.galaxy{position:relative;width:300px;height:300px;animation:spin 8s linear infinite;}
.arm{position:absolute;top:50%;left:50%;transform-origin:0 0;}
.dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);}
.arm1{transform:rotate(0deg);}
.arm1 .d1{width:8px;height:8px;background:#00d4ff;left:45px;top:0;opacity:.9;box-shadow:0 0 6px #00d4ff;}
.arm1 .d2{width:6px;height:6px;background:#66e5ff;left:80px;top:5px;opacity:.7;}
.arm1 .d3{width:4px;height:4px;background:#99eeff;left:115px;top:10px;opacity:.5;}
.arm2{transform:rotate(90deg);}
.arm2 .d1{width:8px;height:8px;background:#ff00ff;left:45px;top:0;opacity:.9;box-shadow:0 0 6px #ff00ff;}
.arm2 .d2{width:6px;height:6px;background:#ff66ff;left:78px;top:5px;opacity:.7;}
.arm2 .d3{width:4px;height:4px;background:#ffaaff;left:110px;top:10px;opacity:.5;}
.arm3{transform:rotate(180deg);}
.arm3 .d1{width:8px;height:8px;background:#ffd700;left:45px;top:0;opacity:.9;box-shadow:0 0 6px #ffd700;}
.arm3 .d2{width:6px;height:6px;background:#ffe566;left:80px;top:5px;opacity:.7;}
.arm3 .d3{width:4px;height:4px;background:#fff0aa;left:115px;top:10px;opacity:.5;}
.arm4{transform:rotate(270deg);}
.arm4 .d1{width:8px;height:8px;background:#00ff88;left:45px;top:0;opacity:.9;box-shadow:0 0 6px #00ff88;}
.arm4 .d2{width:6px;height:6px;background:#66ffbb;left:78px;top:5px;opacity:.7;}
.arm4 .d3{width:4px;height:4px;background:#aaffdd;left:110px;top:10px;opacity:.5;}
.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,#fff,#88ccff);box-shadow:0 0 20px #fff,0 0 40px rgba(136,204,255,.8);z-index:10;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style></head>
<body>
<div class="galaxy">
  <div class="arm arm1"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
  <div class="arm arm2"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
  <div class="arm arm3"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
  <div class="arm arm4"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
  <div class="core"></div>
</div>
</body></html>
